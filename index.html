<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>本地视频分类播放器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css?v=31" />
  </head>
  <body>
    <div id="app" class="app">
      <div id="appThemeBackdrop" class="app-theme-backdrop" aria-hidden="true"></div>
      <header class="toolbar" aria-label="工具栏">
        <div class="toolbar-inner">
          <div class="toolbar-slot">
            <label class="toolbar-chip toolbar-chip-search">
              <span class="toolbar-chip-icon" aria-hidden="true">
              <svg viewBox="0 0 1024 1024" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M1004.7744 1004.7488a65.6384 65.6384 0 0 1-92.8768 0l-177.664-177.6128c-76.7488 57.4464-171.008 92.672-274.2784 92.672A459.9296 459.9296 0 0 1 0.0256 459.9808a459.9296 459.9296 0 1 1 919.808 0c0 103.2192-35.2256 197.4784-92.672 274.3296l177.664 177.5616c25.6 25.6512 25.6 67.2768 0 92.928zM460.8256 136.5504a324.2496 324.2496 0 1 0 0.1024 648.4992 324.2496 324.2496 0 0 0-0.1024-648.4992z"
                />
              </svg>
            </span>
            <input
              id="searchInput"
              class="toolbar-chip-input"
              type="search"
              placeholder=""
              aria-label="搜索"
            />
            </label>
          </div>

          <div class="toolbar-filter">
            <button
              type="button"
              class="toolbar-chip toolbar-filter-btn"
              id="filterCategoryBtn"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="toolbar-filter-label">筛选分类</span>
            </button>
            <div
              class="toolbar-filter-panel"
              id="filterCategoryPanel"
              role="listbox"
              hidden
            ></div>
          </div>

          <div class="toolbar-filter">
            <button
              type="button"
              class="toolbar-chip toolbar-filter-btn"
              id="filterAuthorBtn"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="toolbar-filter-label">筛选作者</span>
            </button>
            <div
              class="toolbar-filter-panel"
              id="filterAuthorPanel"
              role="listbox"
              hidden
            ></div>
          </div>

          <div class="toolbar-filter">
            <button
              type="button"
              class="toolbar-chip toolbar-filter-btn"
              id="filterRoleBtn"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="toolbar-filter-label">筛选歌手</span>
            </button>
            <div
              class="toolbar-filter-panel"
              id="filterRolePanel"
              role="listbox"
              hidden
            ></div>
          </div>

          <div class="toolbar-filter">
            <button
              type="button"
              class="toolbar-chip toolbar-filter-btn"
              id="filterLevelBtn"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span class="toolbar-filter-label">喜爱等级</span>
            </button>
            <div
              class="toolbar-filter-panel"
              id="filterLevelPanel"
              role="listbox"
              hidden
            ></div>
          </div>
        </div>
      </header>

      <main class="main" id="appMain">
        <section class="panel panel-info" id="infoPanelRoot" aria-label="视频信息">
          <button
            type="button"
            class="panel-title"
            id="infoTitleBtn"
            aria-expanded="false"
          >
            视频信息
          </button>
          <div class="panel-body info-view" id="infoView">
            <div class="info-row info-row-cover">
              <div class="info-cover-box" id="infoCoverBox">
                <span class="info-cover-placeholder" id="infoCoverPlaceholder">封面</span>
                <img id="infoCoverImg" class="info-cover-img" alt="" hidden />
                <canvas
                  id="infoColorWheel"
                  class="info-color-wheel"
                  width="200"
                  height="200"
                  hidden
                ></canvas>
              </div>
            </div>

            <div class="info-row">
              <span class="info-label">名称：</span>
              <div class="info-field">
                <div class="info-value-box" id="infoNameDisplay" title="点击复制" role="button" tabindex="0"></div>
              </div>
            </div>

            <div class="info-row">
              <span class="info-label">分类：</span>
              <div class="info-field">
                <div class="info-chips" id="infoCategoryChips"></div>
                <input
                  type="text"
                  class="info-input"
                  id="infoCategoryInput"
                  hidden
                />
              </div>
            </div>

            <div class="info-row">
              <span class="info-label">作者：</span>
              <div class="info-field">
                <div class="info-chips" id="infoAuthorChips"></div>
                <input type="text" class="info-input" id="infoAuthorInput" hidden />
              </div>
            </div>

            <div class="info-row">
              <span class="info-label">歌手：</span>
              <div class="info-field">
                <div class="info-chips" id="infoRoleChips"></div>
                <input type="text" class="info-input" id="infoRoleInput" hidden />
              </div>
            </div>

            <div class="info-row">
              <span class="info-label">喜爱：</span>
              <div class="info-field">
                <div class="info-level" id="infoLevel" role="group" aria-label="喜爱等级"></div>
              </div>
            </div>

            <div class="info-row info-row-edit-only">
              <span class="info-label">取色：</span>
              <div class="info-field">
                <div
                  class="info-cover-mode"
                  id="infoCoverMode"
                  role="tablist"
                  aria-label="取色模式"
                >
                  <button
                    type="button"
                    class="info-cover-mode-btn is-active"
                    data-mode="cover"
                    role="tab"
                    aria-selected="true"
                  >
                    封面
                  </button>
                  <button
                    type="button"
                    class="info-cover-mode-btn"
                    data-mode="light"
                    role="tab"
                    aria-selected="false"
                  >
                    亮色盘
                  </button>
                  <button
                    type="button"
                    class="info-cover-mode-btn"
                    data-mode="dark"
                    role="tab"
                    aria-selected="false"
                  >
                    深色盘
                  </button>
                </div>
              </div>
            </div>

            <div class="info-row info-row-pick info-row-edit-only">
              <span class="info-label">主题：</span>
              <div class="info-field info-field-pick">
                <button
                  type="button"
                  class="info-sq-btn info-sq-theme"
                  id="infoThemePreview"
                  aria-label="主题色"
                ></button>
                <div class="info-pick-component-group">
                  <span class="info-pick-label info-pick-component-label">组件：</span>
                  <button
                    type="button"
                    class="info-sq-btn info-sq-component"
                    id="infoComponentPreview"
                    aria-label="组件色"
                  ></button>
                </div>
                <button type="button" class="info-action-btn info-pick-confirm-btn" id="infoConfirmBtn">
                  确定
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="panel panel-player" aria-label="视频展示">
          <svg
            class="panel-player-split-frame"
            aria-hidden="true"
            hidden
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="panelPlayerBorderGrad"
                gradientUnits="objectBoundingBox"
                x1="0"
                y1="0"
                x2="1"
                y2="0"
              ></linearGradient>
            </defs>
            <rect
              class="panel-player-split-frame__ring"
              fill="none"
              stroke="url(#panelPlayerBorderGrad)"
              stroke-linejoin="round"
              stroke-linecap="round"
            />
          </svg>
          <div class="panel-body panel-body-player" id="playerPanel">
            <div id="specialFxRoot" class="special-fx-layer" hidden aria-hidden="true">
              <canvas id="specialFxCanvas" aria-hidden="true"></canvas>
            </div>
            <div class="player-zone player-zone-video">
              <video
                id="videoBackdrop"
                class="player-video-backdrop"
                playsinline
                muted
                aria-hidden="true"
              ></video>
              <video id="videoElement" class="player-video-main" playsinline></video>
            </div>
            <div class="player-progress-wrap" id="playerProgressWrap">
              <div
                class="player-progress-track"
                id="playerProgressTrack"
                role="slider"
                tabindex="0"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
                aria-label="播放进度"
              >
                <div class="player-progress-fill" aria-hidden="true"></div>
                <div class="player-progress-thumb" aria-hidden="true"></div>
              </div>
            </div>
            <div class="player-zone player-zone-viz">
              <div class="player-visualizer" aria-hidden="true">
                <canvas id="visualizerCanvas"></canvas>
              </div>
            </div>
            <div class="player-zone player-zone-controls">
              <div class="player-ctrl-bar" role="toolbar" aria-label="播放控制">
                <button type="button" class="player-ctrl-btn" id="btnImport" title="导入文件" aria-label="导入文件">

                  </svg>

                </button>
                <div class="player-ctrl-volume" id="volumeControl">
                  <div
                    class="player-volume-popover"
                    id="volumePopover"
                    hidden
                    role="group"
                    aria-label="音量调节"
                  >
                    <label class="player-volume-slider-wrap">
                      <span class="visually-hidden">音量</span>
                      <div
                        class="player-volume-track"
                        id="volumeTrack"
                        role="slider"
                        tabindex="0"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        aria-valuenow="100"
                        aria-label="音量"
                      >
                        <div class="player-volume-fill" aria-hidden="true"></div>
                      </div>
                      <div class="player-volume-thumb" aria-hidden="true"></div>
                      <input
                        type="range"
                        class="player-volume-slider"
                        id="volumeSlider"
                        min="0"
                        max="100"
                        value="100"
                        tabindex="-1"
                        aria-hidden="true"
                      />
                    </label>
                  </div>
                  <button
                    type="button"
                    class="player-ctrl-btn"
                    id="btnVolume"
                    title="音量"
                    aria-label="音量"
                    aria-expanded="false"
                    aria-controls="volumePopover"
                  >
